<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>

<body class="bg-light">

<nav class="navbar custom-navbar mb-5">
    <div class="container">
        <a class="navbar-brand" href="index.html">📚 Library</a>
    </div>
</nav>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card card-container">
<div class="card-body p-5">

<h2 class="mb-4">Edit Book</h2>

<form id="editMemberForm">

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input class="form-control" id="bookTitle" placeholder="Enter book title">
    </div>

    <div class="mb-3">
        <label class="form-label">ISBN</label>
        <input class="form-control" id="bookISBN" placeholder="Enter ISBN">
    </div>

    <div class="mb-3">
        <label class="form-label">Author</label>
        <input class="form-control" id="authorName" placeholder="Enter author">
    </div>

    <div class="mb-3">
        <label class="form-label">Genre</label>
        <input class="form-control" id="bookGenre" placeholder="Enter genre">
    </div>

    <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" class="form-control" id="bookPrice" placeholder="Enter price">
    </div>

    <div class="d-flex justify-content-end gap-2">
        <a href="index.html" class="btn btn-secondary">Cancel</a>
        <button class="btn btn-primary">Save</button>
    </div>

</form>

</div>
</div>

</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="scripts/edit-book.js"></script>

</body>
</html>
