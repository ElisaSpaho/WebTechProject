<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Member - Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand mb-0 h1" href="index.html">📚 Library Management System</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="card-title mb-4">Add New Member</h2>
                        <form id="addMemberForm">
                            <div class="mb-3">
                                <label for="memberName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="memberName" required>
                            </div>
                            <div class="mb-3">
                                <label for="memberId" class="form-label">Member ID</label>
                                <input type="text" class="form-control" id="memberId" required>
                            </div>
                            <div class="mb-3">
                                <label for="memberEmail" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="memberEmail" required>
                            </div>
                            <div class="mb-3">
                                <label for="memberPhone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="memberPhone" required>
                            </div>
                            <div class="mb-3">
                                <label for="membershipType" class="form-label">Membership Type</label>
                                <select class="form-select" id="membershipType" required>
                                    <option value="" disabled selected>Select a type...</option>
                                    <option value="Standard">Standard</option>
                                    <option value="Premium">Premium</option>
                                    <option value="Student">Student</option>
                                    <option value="Senior">Senior</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="memberStatus" class="form-label">Status</label>
                                <select class="form-select" id="memberStatus" required>
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a class="btn btn-secondary" href="index.html">Cancel</a>
                                <button type="submit" class="btn btn-primary" onclick="saveMemberInfo(event)">Save Member</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/add-member.js"></script>
</body>
</html>
