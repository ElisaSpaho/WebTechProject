<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>

<body class="bg-light">

<nav class="navbar custom-navbar mb-5">
    <div class="container">
        <a class="navbar-brand" href="index.html">📚 Library</a>
    </div>
</nav>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card card-container">
<div class="card-body p-5">

<h2 class="mb-4">Add New Book</h2>

<form id="addBookForm">

<input class="form-control mb-3" id="bookTitle" placeholder="Title">
<input class="form-control mb-3" id="bookISBN" placeholder="ISBN">
<input class="form-control mb-3" id="authorName" placeholder="Author">
<select class="form-control mb-3" id="bookGenre">
    <option value="">Select Genre</option>
    <option>Fiction</option>
    <option>Non-Fiction</option>
    <option>Sci-Fi</option>
    <option>Fantasy</option>
    <option>History</option>
    <option>Biography</option>
    <option>Romance</option>
    <option>Mystery</option>
</select>
<input class="form-control mb-3" id="bookPrice" placeholder="Price">

<div class="d-flex justify-content-end gap-2">
<a href="index.html" class="btn btn-secondary">Cancel</a>
<button class="btn btn-primary">Save</button>
</div>

</form>

</div>
</div>

</div>
</div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="scripts/add-book.js"></script>

</body>
</html>
