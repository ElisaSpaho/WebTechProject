<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/library.css">
</head>

<body class="bg-light">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar collapsed text-white p-3">
    <h4 class="text-center mb-4">📚 Library</h4>

    <ul class="nav flex-column">
        <li class="nav-item mb-2 border-bottom pb-2">
            <a href="index.html" class="nav-link text-white">Dashboard</a>
        </li>

        <li class="nav-item mb-2 border-bottom pb-2">
            <a href="add-book.html" class="nav-link text-white">Add Book</a>
        </li>

        <li class="nav-item mt-2">
            <button class="btn btn-secondary w-100" id="customerViewBtn">
                Customer View
            </button>
        </li>
    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light me-2" id="toggleSidebarBtn">☰</button>
                <span class="navbar-brand">Library Management System</span>
            </div>
        </div>
    </nav>

    

        <div class="container">

            <h2 class="mb-3">Book Management</h2>

            <!-- SEARCH + BUTTONS -->
            <div class="row mb-4 align-items-center">

                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text">🔍</span>
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="form-control" 
                            placeholder="Search by title, author, or genre..."
                        >
                    </div>
                </div>

                <div class="col-md-6 text-end">
                    <a class="btn btn-primary" href="add-book.html">+ Add Book</a>
                    <button class="btn btn-danger ms-2" id="clearAllBtn">Clear All</button>
                </div>

            </div>

            <!-- TABLE -->
            <div class="table-responsive mt-4" id="bookTableContainer">
                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Title</th>
                            <th>ISBN</th>
                            <th>Author</th>
                            <th>Genre</th>
                            <th>Price (ALL)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookTableBody"></tbody>
                </table>
            </div>

            <!-- CARDS -->
            <div class="row d-none" id="bookCardsContainer"></div>

        </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="scripts/index.js"></script>

</body>
</html>
