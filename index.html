<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/library.css">
</head>

<body class="bg-light">

<div id="sidebar" class="sidebar collapsed text-white p-3">
    <h4 class="text-center mb-4">Library</h4>

    <ul class="nav flex-column">
        <li class="nav-item mb-2 border-bottom pb-2">
            <a href="index.html" class="nav-link text-white">Dashboard</a>
        </li>

        

        <li class="nav-item mt-2">
            <a href="customer.html" class="btn btn-success w-100">Customer View</a>
        </li>
    </ul>
</div>

<div class="main-content">

<nav class="navbar custom-navbar mb-4">
    <div class="container">
        <div class="d-flex align-items-center">
            <span class="navbar-brand">Library Management System</span>
        </div>
    </div>
</nav>

<div class="container">
<div class="card-container">

<h2 class="mb-3">Book Management</h2>

<div class="top-bar">

    <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search by title, author, or genre...">
    </div>

    <div class="button-group">
        <a class="btn btn-primary" href="add-book.html">+ Add Book</a>
        <button class="btn btn-primary ms-2" id="clearAllBtn">Clear All</button>
    </div>

</div>

<div class="table-responsive mt-4" id="bookTableContainer">
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>Title</th>
                <th>ISBN</th>
                <th>Author</th>
                <th>Genre</th>
                <th>Price (ALL)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="bookTableBody"></tbody>
    </table>
</div>

<div class="row d-none" id="bookCardsContainer"></div>

</div>
</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="scripts/index.js"></script>

</body>
</html>
