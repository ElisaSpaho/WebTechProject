<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/library.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand mb-0 h1" href="index.html">📚 Library Management System</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="card-title mb-4">Add New Book</h2>
                        <form id="addBookForm">
                            <div class="mb-3">
                                <label for="bookTitle" class="form-label">Book Title</label>
                                <input type="text" class="form-control" id="bookTitle" required>
                            </div>
                            <div class="mb-3">
                                <label for="bookISBN" class="form-label">ISBN</label>
                                <input type="text" class="form-control" id="bookISBN" required>
                            </div>
                            <div class="mb-3">
                                <label for="authorName" class="form-label">Author</label>
                                <input type="email" class="form-control" id="authorName" required>
                            </div>
                            <div class="mb-3">
                                <label for="bookGenre" class="form-label">Genre</label>
                                <select class="form-select" id="bookGenre" required>
                                    <option value="" disabled selected>Select a genre...</option>
                                    <option value="Fiction">Fiction</option>
                                    <option value="Science">Science</option>
                                    <option value="Technology">Technology</option>
                                    <option value="History">History</option>
                                    <option value="Romance">Romance</option>
                                    <option value="Fantasy">Fantasy</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                   <label for="bookPrice" class="form-label">Price (ALL)</label>
                                 <input type="number" class="form-control" id="bookPrice" required>
                            </div>

                            
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a class="btn btn-secondary" href="index.html">Cancel</a>
                                <button type="submit" class="btn btn-primary" onclick="saveBookInfo(event)">Save Book</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/add-book.js"></script>
</body>
</html>
